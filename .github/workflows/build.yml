name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            arch: amd64
          - rid: linux-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'src/*/packages.lock.json'

      - name: Restore
        run: dotnet restore

      - name: Run tests
        if: matrix.arch == 'amd64'
        run: dotnet test --no-restore --verbosity normal

      # Standalone self-contained binary for GitHub Releases direct download
      - name: Publish CLI - standalone (${{ matrix.rid }})
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ needs.version.outputs.version }}
          -o ./publish/standalone/${{ matrix.rid }}

      # Framework-dependent output for .deb/.rpm packages (requires dotnet-runtime-10.0)
      - name: Publish CLI - framework-dependent (${{ matrix.rid }})
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained false
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:Version=${{ needs.version.outputs.version }}
          -o ./publish/fdd/${{ matrix.rid }}

      - name: Build .deb package
        run: |
          PKG=kmitlnetauth_${{ needs.version.outputs.version }}_${{ matrix.arch }}
          mkdir -p ./publish/deb/${PKG}/DEBIAN
          mkdir -p ./publish/deb/${PKG}/usr/lib/kmitlnetauth
          mkdir -p ./publish/deb/${PKG}/usr/bin
          mkdir -p ./publish/deb/${PKG}/etc/systemd/system

          # Install framework-dependent assemblies to /usr/lib/kmitlnetauth/
          cp -r ./publish/fdd/${{ matrix.rid }}/* ./publish/deb/${PKG}/usr/lib/kmitlnetauth/

          # Create wrapper script at /usr/bin/kmitlnetauth
          cat > ./publish/deb/${PKG}/usr/bin/kmitlnetauth <<'WRAPPER'
          #!/bin/bash
          exec dotnet /usr/lib/kmitlnetauth/kmitlnetauth.dll "$@"
          WRAPPER
          sed -i 's/^          //' ./publish/deb/${PKG}/usr/bin/kmitlnetauth
          chmod 755 ./publish/deb/${PKG}/usr/bin/kmitlnetauth

          cp packaging/systemd/kmitlnetauth.service ./publish/deb/${PKG}/etc/systemd/system/

          cat > ./publish/deb/${PKG}/DEBIAN/control <<EOF
          Package: kmitlnetauth
          Version: ${{ needs.version.outputs.version }}
          Section: net
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Depends: dotnet-runtime-10.0
          Maintainer: Nonthaphan Inthawong <67015067@kmitl.ac.th>
          Description: Auto-authentication service for KMITL network
          EOF
          sed -i 's/^          //' ./publish/deb/${PKG}/DEBIAN/control

          cp packaging/debian/postinst ./publish/deb/${PKG}/DEBIAN/
          cp packaging/debian/prerm ./publish/deb/${PKG}/DEBIAN/
          chmod 755 ./publish/deb/${PKG}/DEBIAN/postinst
          chmod 755 ./publish/deb/${PKG}/DEBIAN/prerm

          dpkg-deb --build ./publish/deb/${PKG}

          # Rename deb to use consistent - separator
          for f in ./publish/deb/*.deb; do
            newname=$(echo "$f" | sed 's/_/-/g')
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Build .rpm package
        run: |
          sudo apt-get install -y rpm
          mkdir -p rpmbuild/{SPECS,BUILD,RPMS,SOURCES}

          # Copy framework-dependent output for RPM
          cp -r ./publish/fdd/${{ matrix.rid }} rpmbuild/SOURCES/app
          cp packaging/systemd/kmitlnetauth.service rpmbuild/SOURCES/

          if [ "${{ matrix.arch }}" = "amd64" ]; then RPM_ARCH="x86_64"; else RPM_ARCH="aarch64"; fi

          cat > rpmbuild/SPECS/kmitlnetauth.spec <<EOF
          Name: kmitlnetauth
          Version: ${{ needs.version.outputs.version }}
          Release: 1
          Summary: Auto-authentication service for KMITL network
          License: MIT
          Requires: dotnet-runtime-10.0

          %description
          A secure, cross-platform auto-authentication service for the KMITL network.

          %install
          mkdir -p %{buildroot}/usr/lib/kmitlnetauth
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/etc/systemd/system
          cp -r %{_sourcedir}/app/* %{buildroot}/usr/lib/kmitlnetauth/
          cp %{_sourcedir}/kmitlnetauth.service %{buildroot}/etc/systemd/system/

          # Create wrapper script
          cat > %{buildroot}/usr/bin/kmitlnetauth <<'WRAPPER'
          #!/bin/bash
          exec dotnet /usr/lib/kmitlnetauth/kmitlnetauth.dll "\$@"
          WRAPPER
          chmod 755 %{buildroot}/usr/bin/kmitlnetauth

          %files
          %attr(755,root,root) /usr/bin/kmitlnetauth
          /usr/lib/kmitlnetauth/
          %attr(644,root,root) /etc/systemd/system/kmitlnetauth.service

          %post
          systemctl daemon-reload
          systemctl enable kmitlnetauth.service
          systemctl start kmitlnetauth.service || true

          %preun
          systemctl stop kmitlnetauth.service || true
          systemctl disable kmitlnetauth.service || true
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/kmitlnetauth.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
            --define "_rpmdir $(pwd)/publish/rpm" \
            --define "_build_name_fmt %%{NAME}-%%{VERSION}-%%{RELEASE}.${RPM_ARCH}.rpm" \
            --target ${RPM_ARCH}-linux \
            -bb rpmbuild/SPECS/kmitlnetauth.spec

      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            publish/standalone/${{ matrix.rid }}/kmitlnetauth
            publish/deb/*.deb
            publish/rpm/*.rpm

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'src/*/packages.lock.json'

      - name: Restore
        run: dotnet restore

      # Framework-dependent publish - both CLI and Tray go to the same output folder
      # so they share common assemblies (KmitlNetAuth.Core.dll, Serilog, etc.)
      - name: Publish CLI - framework-dependent (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:Version=${{ needs.version.outputs.version }}
          -o ./publish/win-x64

      - name: Publish Tray - framework-dependent (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Tray/KmitlNetAuth.Tray.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:Version=${{ needs.version.outputs.version }}
          -o ./publish/win-x64

      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix --version 5.0.2

      # Generate a WiX fragment that lists every file from the publish folder.
      # Each file becomes its own Component (WiX best practice for per-file ref-counting).
      - name: Generate WiX file fragment
        shell: pwsh
        run: |
          $publishDir = "./publish/win-x64"
          $files = Get-ChildItem -Path $publishDir -File
          $xml = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Fragment>
              <ComponentGroup Id="PublishComponents" Directory="INSTALLFOLDER">
          "@

          foreach ($file in $files) {
            # Replace all non-alphanumeric/underscore chars (including dots) for safe WiX identifiers
            $safeId = $file.Name -replace '[^a-zA-Z0-9_]', '_'
            $xml += @"

                <Component Id="Comp_$safeId" Guid="*">
                  <File Id="File_$safeId" Source="!(bindpath.PublishDir)\$($file.Name)" KeyPath="yes" />
                </Component>
          "@
          }

          $xml += @"

              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          $xml | Out-File -FilePath "./publish/Files.wxs" -Encoding UTF8
          Write-Host "Generated Files.wxs with $($files.Count) files"
          Get-Content "./publish/Files.wxs"

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        run: >
          wix build packaging/wix/Package.wxs ./publish/Files.wxs
          -arch x64
          -ext WixToolset.UI.wixext
          -bindpath PublishDir=./publish/win-x64
          -o ./publish/kmitlnetauth-${{ needs.version.outputs.version }}.msi

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            publish/*.msi

  build-docker:
    needs: [version, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: linux-amd64
          path: docker-bin/amd64

      - uses: actions/download-artifact@v8
        with:
          name: linux-arm64
          path: docker-bin/arm64

      - name: Prepare per-platform binaries
        run: |
          mkdir -p docker-ctx/amd64 docker-ctx/arm64
          find docker-bin/ -type f -name "kmitlnetauth" -ls
          find docker-bin/amd64 -name "kmitlnetauth" -type f -exec cp {} docker-ctx/amd64/ \;
          find docker-bin/arm64 -name "kmitlnetauth" -type f -exec cp {} docker-ctx/arm64/ \;
          chmod +x docker-ctx/amd64/kmitlnetauth docker-ctx/arm64/kmitlnetauth
          ls -lh docker-ctx/amd64/ docker-ctx/arm64/

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.version.outputs.version }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [version, build-linux, build-windows, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release

          # Linux amd64 - standalone binary for direct download
          find artifacts/linux-amd64 -name "kmitlnetauth" -type f -exec cp {} release/kmitlnetauth-${VERSION}-x86_64 \;
          find artifacts/linux-amd64 -name "*.deb" -exec cp {} release/ \;
          find artifacts/linux-amd64 -name "*.rpm" -exec cp {} release/ \;

          # Linux arm64 - standalone binary for direct download
          find artifacts/linux-arm64 -name "kmitlnetauth" -type f -exec cp {} release/kmitlnetauth-${VERSION}-aarch64 \;
          find artifacts/linux-arm64 -name "*.deb" -exec cp {} release/ \;
          find artifacts/linux-arm64 -name "*.rpm" -exec cp {} release/ \;

          # Windows (MSI only - includes both CLI and Tray)
          find artifacts/windows-x64 -name "*.msi" -exec cp {} release/ \;

          ls -lh release/

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          REPO_URL="https://github.com/${{ github.repository }}"

          git tag "$TAG"
          git push origin "$TAG"

          cat > /tmp/release-body.md <<EOF
          ## Downloads

          | Platform | x86-64 (64-bit) | AArch64 (ARM64) |
          |---|---|---|
          | **Windows** | [MSI Installer](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}.msi) | - |
          | **Debian / Ubuntu** | [.deb](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-amd64.deb) | [.deb](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-arm64.deb) |
          | **RHEL / Fedora** | [.rpm](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-1.x86_64.rpm) | [.rpm](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-1.aarch64.rpm) |
          | **Linux (binary)** | [Download](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-x86_64) | [Download](${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-aarch64) |
          | **Docker** | \`docker pull ghcr.io/${{ github.repository }}:${VERSION}\` ||

          > **Windows MSI** includes both the CLI service and system tray application.
          > The MSI requires [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0) to be installed.
          >
          > **Linux .deb/.rpm** packages require \`dotnet-runtime-10.0\` (installed automatically as a dependency).
          >
          > **Linux binary** is self-contained and requires no runtime.
          >
          > **Docker** image supports both amd64 and arm64 architectures.

          ## Quick Install

          \`\`\`bash
          # Debian/Ubuntu (x86_64)
          curl -LO ${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-amd64.deb
          sudo dpkg -i kmitlnetauth-${VERSION}-amd64.deb

          # Standalone binary (no runtime needed)
          curl -LO ${REPO_URL}/releases/download/${TAG}/kmitlnetauth-${VERSION}-x86_64
          chmod +x kmitlnetauth-${VERSION}-x86_64
          ./kmitlnetauth-${VERSION}-x86_64 -d

          # Docker
          docker run -d -e KMITL_USERNAME=670xxxxx -e KMITL_PASSWORD=xxx ghcr.io/${{ github.repository }}:${VERSION}
          \`\`\`
          EOF
          sed -i 's/^          //' /tmp/release-body.md

          gh release create "$TAG" release/* \
            --title "v${VERSION}" \
            --notes-file /tmp/release-body.md \
            --latest
