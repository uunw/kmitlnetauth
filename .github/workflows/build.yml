name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore

      - name: Publish CLI (linux-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/linux-x64

      - name: Build .deb package
        run: |
          mkdir -p ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN
          mkdir -p ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/usr/bin
          mkdir -p ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/etc/systemd/system

          cp ./publish/linux-x64/kmitlnetauth ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/usr/bin/
          cp packaging/systemd/kmitlnetauth.service ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/etc/systemd/system/

          cat > ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/control << CTRL
          Package: kmitlnetauth
          Version: ${{ env.VERSION }}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: Nonthaphan Inthawong <67015067@kmitl.ac.th>
          Description: Auto-authentication service for KMITL network
          CTRL
          # Remove leading spaces from heredoc
          sed -i 's/^          //' ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/control

          cp packaging/debian/postinst ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/
          cp packaging/debian/prerm ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/
          chmod 755 ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/postinst
          chmod 755 ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64/DEBIAN/prerm

          dpkg-deb --build ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64
          mv ./publish/deb/kmitlnetauth_${{ env.VERSION }}_amd64.deb ./publish/deb/

      - name: Build .rpm package
        run: |
          sudo apt-get install -y rpm
          mkdir -p rpmbuild/{SPECS,BUILD,RPMS,SOURCES}

          cp ./publish/linux-x64/kmitlnetauth rpmbuild/SOURCES/
          cp packaging/systemd/kmitlnetauth.service rpmbuild/SOURCES/

          cat > rpmbuild/SPECS/kmitlnetauth.spec << 'SPEC'
          Name: kmitlnetauth
          Version: ${{ env.VERSION }}
          Release: 1
          Summary: Auto-authentication service for KMITL network
          License: MIT
          Group: Applications/Internet

          %description
          A secure, cross-platform auto-authentication service for the KMITL network.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/etc/systemd/system
          cp %{_sourcedir}/kmitlnetauth %{buildroot}/usr/bin/
          cp %{_sourcedir}/kmitlnetauth.service %{buildroot}/etc/systemd/system/

          %files
          %attr(755,root,root) /usr/bin/kmitlnetauth
          %attr(644,root,root) /etc/systemd/system/kmitlnetauth.service

          %post
          systemctl daemon-reload
          systemctl enable kmitlnetauth.service
          systemctl start kmitlnetauth.service || true

          %preun
          systemctl stop kmitlnetauth.service || true
          systemctl disable kmitlnetauth.service || true
          SPEC
          sed -i 's/^          //' rpmbuild/SPECS/kmitlnetauth.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/kmitlnetauth.spec
          mkdir -p ./publish/rpm
          cp rpmbuild/RPMS/x86_64/*.rpm ./publish/rpm/ || cp rpmbuild/RPMS/noarch/*.rpm ./publish/rpm/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            publish/linux-x64/kmitlnetauth
            publish/deb/*.deb
            publish/rpm/*.rpm

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/linux-x64/kmitlnetauth
            publish/deb/*.deb
            publish/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: Set version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore

      - name: Publish CLI (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/win-x64-cli

      - name: Publish Tray (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Tray/KmitlNetAuth.Tray.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/win-x64-tray

      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: >
          wix build packaging/wix/Package.wxs
          -bindpath CliPublish=./publish/win-x64-cli
          -bindpath TrayPublish=./publish/win-x64-tray
          -o ./publish/kmitlnetauth-${{ env.VERSION }}.msi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: publish/*.msi

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.msi

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
