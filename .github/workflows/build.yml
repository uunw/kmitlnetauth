name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            arch: amd64
          - rid: linux-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'src/*/packages.lock.json'

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore

      - name: Publish CLI (${{ matrix.rid }})
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/${{ matrix.rid }}

      - name: Build .deb package
        run: |
          PKG=kmitlnetauth_${{ env.VERSION }}_${{ matrix.arch }}
          mkdir -p ./publish/deb/${PKG}/DEBIAN
          mkdir -p ./publish/deb/${PKG}/usr/bin
          mkdir -p ./publish/deb/${PKG}/etc/systemd/system

          cp ./publish/${{ matrix.rid }}/kmitlnetauth ./publish/deb/${PKG}/usr/bin/
          cp packaging/systemd/kmitlnetauth.service ./publish/deb/${PKG}/etc/systemd/system/

          cat > ./publish/deb/${PKG}/DEBIAN/control <<EOF
          Package: kmitlnetauth
          Version: ${{ env.VERSION }}
          Section: net
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Maintainer: Nonthaphan Inthawong <67015067@kmitl.ac.th>
          Description: Auto-authentication service for KMITL network
          EOF
          sed -i 's/^          //' ./publish/deb/${PKG}/DEBIAN/control

          cp packaging/debian/postinst ./publish/deb/${PKG}/DEBIAN/
          cp packaging/debian/prerm ./publish/deb/${PKG}/DEBIAN/
          chmod 755 ./publish/deb/${PKG}/DEBIAN/postinst
          chmod 755 ./publish/deb/${PKG}/DEBIAN/prerm

          dpkg-deb --build ./publish/deb/${PKG}

      - name: Build .rpm package
        run: |
          sudo apt-get install -y rpm
          mkdir -p rpmbuild/{SPECS,BUILD,RPMS,SOURCES}

          cp ./publish/${{ matrix.rid }}/kmitlnetauth rpmbuild/SOURCES/
          cp packaging/systemd/kmitlnetauth.service rpmbuild/SOURCES/

          if [ "${{ matrix.arch }}" = "amd64" ]; then RPM_ARCH="x86_64"; else RPM_ARCH="aarch64"; fi

          cat > rpmbuild/SPECS/kmitlnetauth.spec <<EOF
          Name: kmitlnetauth
          Version: ${{ env.VERSION }}
          Release: 1
          Summary: Auto-authentication service for KMITL network
          License: MIT

          %description
          A secure, cross-platform auto-authentication service for the KMITL network.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/etc/systemd/system
          cp %{_sourcedir}/kmitlnetauth %{buildroot}/usr/bin/
          cp %{_sourcedir}/kmitlnetauth.service %{buildroot}/etc/systemd/system/

          %files
          %attr(755,root,root) /usr/bin/kmitlnetauth
          %attr(644,root,root) /etc/systemd/system/kmitlnetauth.service

          %post
          systemctl daemon-reload
          systemctl enable kmitlnetauth.service
          systemctl start kmitlnetauth.service || true

          %preun
          systemctl stop kmitlnetauth.service || true
          systemctl disable kmitlnetauth.service || true
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/kmitlnetauth.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
            --define "_rpmdir $(pwd)/publish/rpm" \
            --define "_build_name_fmt %%{NAME}-%%{VERSION}-%%{RELEASE}.${RPM_ARCH}.rpm" \
            --target ${RPM_ARCH}-linux \
            -bb rpmbuild/SPECS/kmitlnetauth.spec

      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            publish/${{ matrix.rid }}/kmitlnetauth
            publish/deb/*.deb
            publish/rpm/*.rpm

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            publish/${{ matrix.rid }}/kmitlnetauth
            publish/deb/*.deb
            publish/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: 'src/*/packages.lock.json'

      - name: Set version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Restore
        run: dotnet restore

      - name: Publish CLI (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Cli/KmitlNetAuth.Cli.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/win-x64-cli

      - name: Publish Tray (win-x64)
        run: >
          dotnet publish src/KmitlNetAuth.Tray/KmitlNetAuth.Tray.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -o ./publish/win-x64-tray

      - name: Install WiX Toolset v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: >
          wix build packaging/wix/Package.wxs
          -bindpath CliPublish=./publish/win-x64-cli
          -bindpath TrayPublish=./publish/win-x64-tray
          -o ./publish/kmitlnetauth-${{ env.VERSION }}.msi

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: |
            publish/win-x64-cli/kmitlnetauth.exe
            publish/win-x64-tray/kmitlnetauth-tray.exe
            publish/*.msi

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            publish/win-x64-cli/kmitlnetauth.exe
            publish/win-x64-tray/kmitlnetauth-tray.exe
            publish/*.msi

  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "VERSION=$(date +%Y%m%d).${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ env.VERSION }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
